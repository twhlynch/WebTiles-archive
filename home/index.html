<!doctype html>
<html lang="en">
	<head>
		<link rel="stylesheet" href="main.css" />
		<style>
			.content {
				box-sizing: border-box;
				position: fixed;
				bottom: 1em;
				top: 0;
				left: 0;
				width: 100%;
				height: 100%;
				display: flex;
				flex-direction: column;
				justify-content: space-between;
				align-items: center;
				gap: 1em;
				padding: 1em 0 2em;
			}
			.content > img {
				height: 31px;
				width: 88px;
				image-rendering: pixelated;
			}
			.scroller {
				width: 100%;
				overflow: hidden;
			}
			.track {
				display: flex;
				width: max-content;
				animation: scroll 20s linear infinite;
				gap: 10px;
				padding-right: 10px;
				box-sizing: border-box;
			}
			.track:hover {
				animation-play-state: paused;
			}
			.track > img {
				width: 50px;
				height: 50px;
				flex: 0 0 50px;
			}
			@keyframes scroll {
				from {
					transform: translateX(0);
				}
				to {
					transform: translateX(-50%);
				}
			}
		</style>
	</head>
	<body>
		<canvas id="buffer1"></canvas>
		<canvas id="buffer2"></canvas>
		<div class="idnex"></div>
		<div class="content">
			<div class="scroller">
				<div class="track">
					<img src="webtiles.jpg" />
					<img src="solitaire.jpg" />
					<img src="tictactoe.jpg" />
					<img src="cube.jpg" />
					<img src="gballs.jpg" />
					<img src="gol.jpg" />
					<img src="troll.jpg" />

					<img src="webtiles.jpg" />
					<img src="solitaire.jpg" />
					<img src="tictactoe.jpg" />
					<img src="cube.jpg" />
					<img src="gballs.jpg" />
					<img src="gol.jpg" />
					<img src="troll.jpg" />
				</div>
			</div>

			<img src="88x31.gif" />
		</div>
		<script src="app.js"></script>
	</body>
</html>

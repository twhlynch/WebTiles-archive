<!doctype html>
<html lang="en">
	<head>
		<style>
			body {
				box-sizing: border-box;
				border-top: 1px solid rgba(0, 0, 0, 0.06);
				border-right: 1px solid rgba(0, 0, 0, 0.06);
			}
			.free {
				width: 100%;
				height: 100%;
				display: flex;
				justify-content: center;
				align-items: center;
			}
			.free > p {
				text-align: center;
				color: rgb(119, 119, 119);
				user-select: none;
			}
		</style>
	</head>
	<body>
		<div class="free">
			<p id="text">Free tile 10, -9</p>
		</div>
		<script>
			var xhr = new XMLHttpRequest();
			xhr.open('GET', 'https://api.counterapi.dev/v1/webtiles_counter/trolled/up', true);

			xhr.onreadystatechange = function () {
				if (xhr.readyState === 4 && xhr.status === 200) {
					var json = JSON.parse(xhr.responseText);
					var count = json.count;
					document.getElementById('text').innerText = 'Trolled: ' + count;
				}
			};

			xhr.send(null);
		</script>
	</body>
</html>

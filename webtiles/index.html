<!doctype html>
<html lang="en">
	<head>
		<style>
			body > #container {
				width: 100%;
				height: 100%;
				top: 0;
				left: 0;
				position: fixed;

				display: grid;
				grid-template-columns: 1fr 1fr 1fr 1fr 1fr;
				grid-template-rows: 1fr 1fr 1fr 1fr 1fr;
			}
			body > #container > div {
				width: 500% !important;
				height: 500% !important;
				outline: 1px solid rgba(0, 0, 0, 0.06);
				font-size: 0.5em !important;
				overflow-y: scroll !important;
				overflow-x: hidden !important;
				max-width: 500% !important;
				max-height: 500% !important;
				position: relative !important;
				transform: scale(0.2) !important;
				transform-origin: top left !important;
			}
			body > #thumb {
				width: 80%;
				position: fixed;
				top: 50%;
				left: 50%;
				transform: translate(-50%, -50%);
			}
		</style>
	</head>
	<body>
		<div id="container">
			<div id="t-2_-2"></div>
			<div id="t-1_-2"></div>
			<div id="t0_-2"></div>
			<div id="t1_-2"></div>
			<div id="t2_-2"></div>

			<div id="t-2_-1"></div>
			<div id="t-1_-1"></div>
			<div id="t0_-1"></div>
			<div id="t1_-1"></div>
			<div id="t2_-1"></div>

			<div id="t-2_0"></div>
			<div id="t-1_0"></div>
			<div id="t0_0"></div>
			<div id="t1_0"></div>
			<div id="t2_0"></div>

			<div id="t-2_1"></div>
			<div id="t-1_1"></div>
			<div id="t0_1"></div>
			<div id="t1_1"></div>
			<div id="t2_1"></div>

			<div id="t-2_2"></div>
			<div id="t-1_2"></div>
			<div id="t0_2"></div>
			<div id="t1_2"></div>
			<div id="t2_2"></div>
		</div>
		<img id="thumb" src="webtiles-logo.png" />
		<script src="app.js"></script>
	</body>
</html>
